<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Divy Srivastava</title>
        <link
        href="https://use.fontawesome.com/releases/v5.12.0/css/all.css"
        rel="stylesheet"
      />
      <link
        href="https://fonts.googleapis.com/css2?family=Righteous&display=swap"
        rel="stylesheet"
      />
        <link rel="stylesheet" href="./css/index.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.14.0/css/all.min.css" integrity="sha512-1PKOgIY59xJ8Co8+NE6FZ+LOAZKjy+KY8iq0G4B3CyeY6wYHN3yt9PW0XpSriVlkMXe40PTKnXrLnZ9+fkDaog==" crossorigin="anonymous" />
        <script type="module">
            import init from "./wasm.js"
            init()
        </script>
         <script>
          window.addEventListener("load", () => {
            new Sign().print(document.body);
          });
    
          class Sign {
            constructor(attr = {}) {
              attr = {
                ...attr,
                ...{
                  href: "https://divy.work",
                  innerText: "divy.work",
                  target: "_blank",
                  style: {
                    fontFamily: "monospace",
                    fontSize: "18px",
                    fontWeight: "bold",
                    textDecoration: "none",
                    color: "rgba(255,255,255,.75)",
                    boxSizing: "border-box",
                    display: "block",
                    position: "fixed",
                    padding: "16px",
                    bottom: "16px",
                    left: "50%",
                    transform: "translateX(-50%)",
                  },
                },
              };
              this.$el = this.create();
              this.$el = this.applyAttributes(this.$el, attr);
              return this;
            }
    
            create() {
              return document.createElement("a");
            }
    
            applyAttributes($a, attr) {
              $a.href = attr.href;
              $a.innerText = attr.innerText;
              $a.target = attr.target;
              Object.assign($a.style, attr.style);
              return $a;
            }
    
            print($container) {
              $container.appendChild(this.$el);
            }
          }
        </script>
    </head>
    <body></body>
</html>
